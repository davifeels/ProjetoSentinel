{% extends "layout.html" %}

{% block title %}Cadastro | SentinelVision{% endblock %}

{% block head_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
{% endblock %}

{% block content %}
    <h1>Ingestão de Novos Dados Biométricos</h1>
    <p class="subtitle">Preencha os campos para adicionar um novo indivíduo ao sistema de vigilância.</p>

    <div class="register-form-panel">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="form-column">
                    <div class="form-group">
                        <label for="name">Nome Completo do Indivíduo *</label>
                        <input id="name" type="text" name="name" placeholder="Obrigatório" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Idade</label>
                        <input id="age" type="number" name="age" placeholder="Ex: 35">
                    </div>
                    <div class="form-group">
                        <label for="doc_number">Nº de Documento (Opcional)</label>
                        <input id="doc_number" type="text" name="doc_number" placeholder="Ex: CPF ou RG">
                    </div>
                    <div class="form-group">
                        <label for="image">Arquivo de Imagem Facial *</label>
                        <input id="image" type="file" name="image" accept="image/*" required>
                    </div>
                </div>
                <div class="form-column">
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="Em Observação">Em Observação</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Procurado">Procurado</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="city">Cidade</label>
                        <input id="city" type="text" name="city" placeholder="Ex: São Paulo">
                    </div>
                    <div class="form-group">
                        <label for="state">Estado (UF)</label>
                        <input id="state" type="text" name="state" placeholder="Ex: SP" maxlength="2">
                    </div>
                     <div class="form-group">
                        <label for="notes">Observações</label>
                        <textarea id="notes" name="notes" rows="4" placeholder="Qualquer informação relevante..."></textarea>
                    </div>
                </div>
            </div>
            <button type="submit">Registrar no Sistema</button>
        </form>
    </div>
{% endblock %}
